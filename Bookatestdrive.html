        <h2 class="testdrive-title">Book a Test Drive</h2>

<div class="testdrive-container">

    <h3>Select your DriveSpace retailer</h3>

    <input type="text" class="testdrive-input" placeholder="Search address, city, or postcode">

    <button class="location-btn">Use my location</button>

    <h3>Your contact details</h3>
    <p>Your chosen DriveSpace dealer will contact you to book a time and date for your test drive.</p>

    <label>Title</label>
    <input type="text" class="testdrive-input" placeholder="Mr / Ms / Miss / Mrs">

    <label>First name</label>
    <input type="text" class="testdrive-input" placeholder="First name">

    <label>Last name</label>
    <input type="text" class="testdrive-input" placeholder="Last name">

    <label>Email</label>
    <input type="email" class="testdrive-input" placeholder="Email">

    <!-- ⭐ EXTRA 3 BOXES YOU ASKED FOR ⭐ -->

    <label>Phone number</label>
    <input type="text" class="testdrive-input" placeholder="Phone number">

    <label>Postcode</label>
    <input type="text" class="testdrive-input" placeholder="Postcode">

    <label>Message (optional)</label>
    <textarea class="testdrive-input" placeholder="Any notes or preferences"></textarea>

    <button class="submit-btn">Submit</button>

</div>
